name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...